name: Update Market Data

on:
  schedule:
    # 9:30 PM UTC = ~4:30 PM EST / 5:30 PM EDT  (Mon–Fri after market close)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # allows manual "Run workflow" button in GitHub UI

permissions:
  contents: write  # needed to commit data/market_data.json back to repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
